<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0b1015; overflow: hidden; color: #58a6ff; font-family: sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; }
        canvas { cursor: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="font-size: 40px; margin: 0;">感知：力的交互</h1>
        <p style="opacity: 0.7;">移动鼠标，观察那个“有生命”的圆</p>
    </div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        let w, h;
        let mouse = { x: -100, y: -100 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resize();

        // 模拟手绘线条的函数（不依赖任何外部库）
        function drawHandline(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            // 增加一点点随机抖动
            const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * 10;
            const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * 10;
            ctx.quadraticCurveTo(midX, midY, x2, y2);
            ctx.strokeStyle = '#58a6ff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function draw() {
            // 半透明背景产生“幻影”效果
            ctx.fillStyle = 'rgba(11, 16, 21, 0.2)';
            ctx.fillRect(0, 0, w, h);

            const centerX = w / 2;
            const centerY = h / 2;

            // 1. 画连接线（带抖动）
            drawHandline(centerX, centerY, mouse.x, mouse.y);

            // 2. 画中心点
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            // 3. 画手绘感的圆
            ctx.beginPath();
            // 让圆的半径也随时间微颤
            const pulse = 60 + Math.sin(Date.now() * 0.01) * 5;
            ctx.arc(mouse.x, mouse.y, pulse, 0, Math.PI*2);
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 5]); // 虚线增加质感
            ctx.stroke();
            
            ctx.fillStyle = 'rgba(88, 166, 255, 0.1)';
            ctx.fill();
            ctx.setLineDash([]); // 重置

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
