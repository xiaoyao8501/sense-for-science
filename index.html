<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sense for Science | 科学直觉实验室</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f4f7f9;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo { width: 120px; border-radius: 50%; transition: transform 0.3s; }
        .logo:hover { transform: scale(1.1); } /* 交互动画：鼠标悬停Logo会放大 */
        h1 { color: #0077cc; text-align: center; }
        .roadmap { background: #eef9ff; padding: 20px; border-left: 5px solid #0077cc; }
        .done { text-decoration: line-through; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <h1>Sense for Science</h1>
        <p>A visual playground for kids to grasp the underlying logic of mathematics, physics, and chemistry.</p>
        
        <div class="roadmap">
            <h3>🚀 项目路线图 (Roadmap)</h3>
            <ul>
                <li class="done">建立 GitHub 仓库与网页托管 (Done!)</li>
                <li>集成 LaTeX 数学公式渲染引擎</li>
                <li>确定第一版视觉风格</li>
                <li><b>Next:</b> 线性代数空间变换动画</li>
            </ul>
        </div>
    </div>
</body>
</html>
