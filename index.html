<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #05070a; overflow: hidden; color: #58a6ff; font-family: sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="font-size: 32px; margin: 0; color: #f2cc60;">感知：万有引力</h1>
        <p id="status" style="opacity: 0.8; font-family: monospace;">$F = G \frac{m_1 m_2}{r^2}$</p>
        <p style="font-size: 14px; color: #888;">靠近中心，感受“引力线”的紧绷与震颤</p>
    </div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let w, h;
        let mouse = { x: -100, y: -100 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resize();

        function draw() {
            // 保持残影，营造空间深邃感
            ctx.fillStyle = 'rgba(5, 7, 10, 0.15)';
            ctx.fillRect(0, 0, w, h);

            const sunX = w / 2;
            const sunY = h / 2;

            // 1. 计算距离 r
            const dx = mouse.x - sunX;
            const dy = mouse.y - sunY;
            const r = Math.sqrt(dx*dx + dy*dy);
            
            // 2. 模拟引力强度 (反比于距离)
            // 距离越小，force越大
            const force = Math.max(0, (400 - r) / 400); 

            // 3. 画“引力束缚线”
            ctx.beginPath();
            ctx.moveTo(sunX, sunY);
            
            // 引力越强，线条抖动越剧烈（挣扎感）
            const wobble = force * 40; 
            const midX = (sunX + mouse.x) / 2 + (Math.random() - 0.5) * wobble;
            const midY = (sunY + mouse.y) / 2 + (Math.random() - 0.5) * wobble;
            
            ctx.quadraticCurveTo(midX, midY, mouse.x, mouse.y);
            
            // 引力越强，颜色越亮，线条越粗
            ctx.strokeStyle = `rgb(${100 + force*155}, ${150 + force*105}, 255)`;
            ctx.lineWidth = 1 + force * 5;
            ctx.stroke();

            // 4. 画“太阳”
            ctx.beginPath();
            ctx.arc(sunX, sunY, 8, 0, Math.PI*2);
            ctx.fillStyle = '#f2cc60';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f2cc60';
            ctx.fill();
            ctx.shadowBlur = 0; // 重置阴影

            // 5. 画“行星”（你的鼠标）
            ctx.beginPath();
            const pulse = 10 + force * 10 + Math.sin(Date.now()*0.01)*2;
            ctx.arc(mouse.x, mouse.y, pulse, 0, Math.PI*2);
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            // 更新数据展示
            status.innerText = `距离 r: ${Math.round(r)} | 感知引力 F: ${(force * 100).toFixed(1)}%`;

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
