<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MathBox 3D 实验室 | Sense for Science</title>
  <link rel="icon" type="image/png" href="favicon.png">
  
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathbox@0.1.11/build/mathbox-bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathbox@0.1.11/build/mathbox.css">

  <style>
    body { margin: 0; background: #0b0e14; overflow: hidden; }
    #info {
      position: absolute; top: 20px; left: 20px;
      color: #58a6ff; font-family: sans-serif;
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">
    <h1>MathBox 3D 测试</h1>
    <p>鼠标左键旋转 | 右键平移 | 滚轮缩放</p>
  </div>

  <script>
    // 1. 初始化 MathBox
    var mathbox = mathBox({
      plugins: ['core', 'controls', 'cursor', 'mathbox'],
      controls: { klass: THREE.OrbitControls }
    });
    var three = mathbox.three;
    three.renderer.setClearColor(new THREE.Color(0x0b0e14), 1.0);

    // 2. 设置视角 (Camera)
    var view = mathbox.setFocus(3).cartesian({
      range: [[-2, 2], [-1, 1], [-1, 1]],
      scale: [2, 1, 1],
    });

    // 3. 画坐标轴 (Axes)
    view.axis({ axis: 1, width: 3, color: '#ff6666' }); // X轴
    view.axis({ axis: 2, width: 3, color: '#66ff66' }); // Y轴
    view.grid({ width: 1, divideX: 20, divideY: 10, opacity: 0.25 });

    // 4. 创建动态数据源 (像 3B1B 一样的函数曲线)
    view.interval({
      id: 'sampler',
      width: 64,
      channels: 2,
      expr: function (emit, x, i, t) {
        // y = sin(x + 时间)
        emit(x, Math.sin(x + t));
      },
    });

    // 5. 将数据渲染成线 (Curve)
    view.line({
      points: '#sampler',
      color: '#58a6ff',
      width: 5,
      stroke: 'dotted'
    });

  </script>
</body>
</html>
