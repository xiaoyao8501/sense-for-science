<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/dist/rough.umd.js"></script>
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh; color: #58a6ff; font-family: 'Segoe UI', sans-serif; }
        canvas { cursor: crosshair; }
        #label { position: absolute; top: 20px; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="label">
        <h1>感知：力的交互</h1>
        <p>移动鼠标，感受线条的“呼吸”</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const rc = rough.canvas(canvas);
        let mouse = { x: canvas.width/2, y: canvas.height/2 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 画一个手绘感的矩形作为背景参考
            rc.rectangle(canvas.width/2 - 150, canvas.height/2 - 150, 300, 300, {
                roughness: 1.5,
                stroke: '#161b22',
                strokeWidth: 2
            });

            // 画一个连接鼠标与中心的“引力线”
            rc.line(canvas.width/2, canvas.height/2, mouse.x, mouse.y, {
                roughness: 2.5,
                stroke: '#58a6ff',
                bowing: 6 // 让线有一点弧度，像被拉弯的弓
            });

            // 画一个跟随鼠标的手绘圆
            rc.circle(mouse.x, mouse.y, 80, {
                fill: "rgba(88, 166, 255, 0.2)",
                fillStyle: 'zigzag', // 锯齿状填充，更有手绘感
                roughness: 2,
                stroke: '#fff'
            });

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
